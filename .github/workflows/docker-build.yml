name: Build and publish Docker images

on:
  push:
    branches: [main]
  workflow_dispatch: {}   # permite disparar manualmente pela aba Actions do GitHub

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # necessário pra publicar no GHCR

    strategy:
      matrix:
        include:
          - image_name: optcgdir-app
            dockerfile: app/Dockerfile
          - image_name: optcgdir-catalog-sync
            dockerfile: catalog-sync/Dockerfile

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e push da imagem
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image_name }}:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image_name }}:${{ github.sha }}
